name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/reenact tests

      - name: Type check (mypy --strict)
        run: uv run mypy --strict src/reenact

      - name: Generate JSON Schema
        run: |
          uv run python -c "
          import json
          from reenact.schema import Recording
          schema = Recording.model_json_schema()
          with open('schema/reenact.schema.json', 'w') as f:
              json.dump(schema, f, indent=2)
          "

      - name: Test (pytest)
        run: uv run pytest tests/ -v
